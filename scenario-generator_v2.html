<style>
  :root{
    --paper:#FDFDFA;
    --paper-warm:#F6F4EC;
    --ink:#2B2A27;
    --quiet:#80796F;
    --faint:#A8A296;
    --wasurenagusa:#3E6BB0;
    --wasurenagusa-soft:#8FA9D6;
    --wasurenagusa-bg:#EDF1F8;
    --gold:#C9A84C;
    --line:#E8E5DC;
    --narou:#B5546E;
    --narou-bg:#F7ECF0;
    --hanyo:#4F8A6B;
    --hanyo-bg:#EAF3EE;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:16px;line-height:1.9;letter-spacing:.03em;
    padding:0 20px 80px;
  }
  .wrap{max-width:680px;margin:0 auto;}

  /* ---- 見出し ---- */
  header{text-align:center;padding:9vh 0 5vh;}
  .flower{display:inline-block;width:26px;height:26px;margin-bottom:16px;}
  .eyebrow{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:10px;letter-spacing:.4em;text-indent:.4em;color:var(--faint);
    margin-bottom:10px;
  }
  h1{
    font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    font-size:25px;font-weight:600;letter-spacing:.08em;margin-bottom:12px;
  }
  h1 .num{color:var(--wasurenagusa);}
  .sub2{font-size:12px;color:var(--quiet);letter-spacing:.1em;}

  /* ---- 生成ボタン ---- */
  .gen-btn{
    display:block;width:100%;max-width:420px;margin:34px auto 0;padding:15px;
    background:var(--wasurenagusa);border:none;border-radius:8px;
    color:#fff;font-weight:600;font-size:15px;letter-spacing:.12em;
    cursor:pointer;font-family:inherit;
    transition:background .18s,transform .18s;
  }
  .gen-btn:hover{background:#345e9c;transform:translateY(-1px);}
  .gen-btn:focus-visible{outline:2px solid var(--wasurenagusa);outline-offset:3px;}
  .gen-btn.small{
    font-size:13px;padding:12px;margin-top:8px;
    background:transparent;color:var(--wasurenagusa);
    border:1px solid var(--wasurenagusa);
  }
  .gen-btn.small:hover{background:var(--wasurenagusa-bg);transform:none;}

  /* ---- コピー ---- */
  .copy-btn{
    display:block;width:100%;max-width:420px;margin:28px auto 0;padding:12px;
    background:var(--paper-warm);border:1px solid var(--line);border-radius:8px;
    color:var(--quiet);font-size:13px;font-weight:600;letter-spacing:.08em;
    cursor:pointer;font-family:inherit;transition:all .2s;
  }
  .copy-btn:hover{border-color:var(--wasurenagusa-soft);color:var(--ink);}
  .copy-btn.ok{background:var(--hanyo-bg);border-color:var(--hanyo);color:var(--hanyo);}

  /* ---- セクション見出し ---- */
  .section-title{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:11px;letter-spacing:.35em;text-indent:.35em;color:var(--quiet);
    margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid var(--line);
  }

  /* ---- キャラ ---- */
  .char-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:36px;}
  .char-card{
    flex:1 1 150px;background:var(--paper-warm);
    border:1px solid var(--line);border-radius:8px;padding:12px 14px;
  }
  .card-label{font-size:11px;color:var(--quiet);margin-bottom:5px;letter-spacing:.06em;}
  .card-text{font-size:13.5px;line-height:1.55;color:var(--ink);margin-bottom:10px;}
  .card-footer{display:flex;justify-content:space-between;align-items:center;}

  .badge{font-size:10px;padding:2px 9px;border-radius:99px;letter-spacing:.05em;}
  .badge.narou{background:var(--narou-bg);color:var(--narou);border:1px solid #E4C4CF;}
  .badge.hanyo{background:var(--hanyo-bg);color:var(--hanyo);border:1px solid #C4DDCD;}

  .reroll{
    font-size:15px;cursor:pointer;user-select:none;line-height:1;
    opacity:.6;transition:opacity .15s,transform .25s;
  }
  .reroll:hover{opacity:1;transform:rotate(35deg);}

  /* ---- 幕 ---- */
  .act-block{margin-bottom:28px;}
  .act-header{
    display:flex;align-items:baseline;gap:10px;margin-bottom:12px;
    padding-bottom:7px;border-bottom:1.5px solid;
  }
  .act-label{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:14px;font-weight:600;letter-spacing:.08em;
  }
  .act-sub{font-size:11px;color:var(--quiet);letter-spacing:.08em;}

  .phase-card{
    border-radius:0 8px 8px 0;padding:11px 15px;
    display:flex;align-items:flex-start;gap:13px;margin-bottom:8px;
    border:1px solid var(--line);border-left-width:3px;
  }
  .phase-num{
    flex-shrink:0;width:30px;height:30px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;
    font-family:"Hiragino Mincho ProN",serif;
  }
  .phase-info{flex:1;min-width:0;}
  .phase-name{font-size:11px;font-weight:700;margin-bottom:3px;letter-spacing:.08em;}
  .phase-text{font-size:14px;line-height:1.55;color:var(--ink);}
  .phase-side{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}

  .empty-msg{
    text-align:center;color:var(--faint);font-size:13px;
    margin-top:36px;line-height:2.2;
  }
  #result{display:none;}

  footer{
    text-align:center;margin-top:56px;
    font-size:11px;color:var(--faint);letter-spacing:.1em;
  }
  footer a{color:var(--wasurenagusa);text-decoration:none;}
  footer a:hover{text-decoration:underline;}

  @media (max-width:480px){
    header{padding:6vh 0 4vh;}
    h1{font-size:21px;}
    .char-card{flex:1 1 100%;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }
</style>
</head>

const ACTS = [
  {n:1,label:"第一幕",sub:"発端・対立",color:"#B5546E",bg:"#FBF5F7"},
  {n:2,label:"第二幕",sub:"葛藤",color:"#C9903E",bg:"#FBF6EC"},
  {n:3,label:"第三幕",sub:"変化・着地",color:"#3E6BB0",bg:"#F2F6FC"},
];

let state = {};

function badge(tp){
  return `<span class="badge ${tp==='なろう'?'narou':'hanyo'}">${tp}</span>`;
}

function rerollChar(key){
  state.chars[key] = R(CHAR[key].opts);
  renderChar(key);
}
function rerollPhase(n){
  state.phases[n] = R(PHASES.find(p=>p.n===n).opts);
  renderPhase(n);
}

function renderChar(key){
  const el = document.getElementById('char-'+key);
  if(!el) return;
  const c = state.chars[key];
  el.querySelector('.card-text').textContent = c.t;
  el.querySelector('.badge-wrap').innerHTML = badge(c.tp);
}
function renderPhase(n){
  const el = document.getElementById('phase-'+n);
  if(!el) return;
  const c = state.phases[n];
  el.querySelector('.phase-text').textContent = c.t;
  el.querySelector('.badge-wrap').innerHTML = badge(c.tp);
}

function generate(){
  state.chars={};
  Object.keys(CHAR).forEach(k=>{ state.chars[k]=R(CHAR[k].opts); });
  state.phases={};
  PHASES.forEach(p=>{ state.phases[p.n]=R(p.opts); });
  render();
  document.getElementById('result').style.display='block';
  document.getElementById('empty-msg').style.display='none';
}

function render(){
  const cg = document.getElementById('char-grid');
  cg.innerHTML = Object.entries(CHAR).map(([key,def])=>{
    const c = state.chars[key];
    return `<div class="char-card" id="char-${key}">
      <div class="card-label">${def.label}</div>
      <div class="card-text">${c.t}</div>
      <div class="card-footer">
        <span class="badge-wrap">${badge(c.tp)}</span>
        <span class="reroll" onclick="rerollChar('${key}')" title="振り直す">🎲</span>
      </div>
    </div>`;
  }).join('');

  const acts = document.getElementById('acts');
  acts.innerHTML = ACTS.map(a=>{
    const ps = PHASES.filter(p=>p.act===a.n);
    return `<div class="act-block">
      <div class="act-header" style="border-color:${a.color}">
        <span class="act-label" style="color:${a.color}">${a.label}</span>
        <span class="act-sub">${a.sub}</span>
      </div>
      ${ps.map(p=>{
        const c = state.phases[p.n];
        return `<div class="phase-card" id="phase-${p.n}"
          style="background:${a.bg};border-left-color:${a.color}">
          <div class="phase-num" style="background:${a.color}1A;color:${a.color}">${p.n}</div>
          <div class="phase-info">
            <div class="phase-name" style="color:${a.color}">${p.name}</div>
            <div class="phase-text">${c.t}</div>
          </div>
          <div class="phase-side">
            <span class="badge-wrap">${badge(c.tp)}</span>
            <span class="reroll" onclick="rerollPhase(${p.n})" title="振り直す">🎲</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  const cb = document.getElementById('copy-btn');
  cb.className='copy-btn';
  cb.textContent='シナリオ全文をコピー';
}

function copyAll(){
  const charText = Object.entries(CHAR)
    .map(([k,v])=>`【${v.label}】${state.chars[k].t}`).join('\n');
  const phaseText = PHASES
    .map(p=>`${p.n}. ${p.name}：${state.phases[p.n].t}`).join('\n');
  const text = `=== シナリオ骨格 ===\n\n▼ キャラクター設定\n${charText}\n\n▼ 13フェイズ\n${phaseText}`;
  navigator.clipboard.writeText(text).then(()=>{
    const cb = document.getElementById('copy-btn');
    cb.className='copy-btn ok';
    cb.textContent='✓ コピーしました';
    setTimeout(()=>{cb.className='copy-btn';cb.textContent='シナリオ全文をコピー';},2000);
  });
}
