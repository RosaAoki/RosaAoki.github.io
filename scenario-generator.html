<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A1E;color:#E8E8F0;font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;

h1{text-align:center;font-size:22px;font-weight:800;letter-spacing:2px;margin-bottom:4px}
.subtitle{text-align:center;font-size:10px;letter-spacing:3px;color:#555;margin-bottom:6px}
.sub2{text-align:center;font-size:11px;color:#555;margin-bottom:28px}
.gold{color:#D4AC0D}
.gen-btn{display:block;width:100%;max-width:480px;margin:0 auto 28px;padding:14px;
  background:linear-gradient(135deg,#B8860B,#D4AC0D,#B8860B);
  border:none;border-radius:10px;color:#000;font-weight:800;font-size:16px;
  letter-spacing:2px;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .15s}
.gen-btn:hover{opacity:.88;transform:scale(1.02)}
.gen-btn.small{font-size:14px;letter-spacing:1px;padding:12px;margin-top:16px}
.copy-btn{display:block;width:100%;max-width:480px;margin:0 auto 16px;padding:12px;
  background:#13132A;border:1px solid #2A2A4A;border-radius:10px;color:#888;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.copy-btn.ok{background:#1A4A2A;border-color:#2A8A4A;color:#5CDD8B}
.section-title{font-size:10px;letter-spacing:3px;color:#555;margin-bottom:12px}
.char-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.char-card{flex:1 1 140px;background:#12122A;border:1px solid #1E1E3A;border-radius:8px;padding:10px 12px}
.card-label{font-size:10px;color:#555;margin-bottom:4px}
.card-text{font-size:13px;line-height:1.5;color:#DDD;margin-bottom:8px}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.badge{font-size:10px;padding:2px 7px;border-radius:99px}
.badge.narou{background:#4A1020;color:#FF7096;border:1px solid #7A2040}
.badge.hanyo{background:#0D2E1A;color:#5CDD8B;border:1px solid #1A5030}
.reroll{font-size:14px;cursor:pointer;transition:opacity .15s,transform .2s;user-select:none}
.reroll:hover{opacity:.7;transform:rotate(30deg)}
.act-block{margin-bottom:24px}
.act-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px}
.act-label{font-size:13px;font-weight:800}
.act-sub{font-size:10px;color:#555}
.phase-card{border-radius:0 8px 8px 0;padding:10px 14px;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.phase-num{flex-shrink:0;width:32px;height:32px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.phase-info{flex:1}
.phase-name{font-size:11px;font-weight:700;margin-bottom:3px}
.phase-text{font-size:14px;line-height:1.6;color:#DDD}
.phase-side{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.phase-side .reroll{font-size:14px}
.empty-msg{text-align:center;color:#2A2A4A;font-size:13px;margin-top:40px;line-height:2}
#result{display:none}
</style>
</head>

const ACTS = [

  {n:2,label:"第二幕",sub:"葛藤",color:"#E67E22",bg:"rgba(230,126,34,0.08)"},
  {n:3,label:"第三幕",sub:"変化・満足",color:"#D4AC0D",bg:"rgba(212,172,13,0.08)"},
];

let state = {};

function badge(tp){
  return `<span class="badge ${tp==='なろう'?'narou':'hanyo'}">${tp}</span>`;
}

function rerollChar(key){
  state.chars[key] = R(CHAR[key].opts);
  renderChar(key);
}

function rerollPhase(n){
  state.phases[n] = R(PHASES.find(p=>p.n===n).opts);
  renderPhase(n);
}

function renderChar(key){
  const el = document.getElementById('char-'+key);
  if(!el) return;
  const c = state.chars[key];
  el.querySelector('.card-text').textContent = c.t;
  el.querySelector('.badge-wrap').innerHTML = badge(c.tp);
}

function renderPhase(n){
  const el = document.getElementById('phase-'+n);
  if(!el) return;
  const c = state.phases[n];
  el.querySelector('.phase-text').textContent = c.t;
  el.querySelector('.badge-wrap').innerHTML = badge(c.tp);
}

function generate(){
  state.chars={};
  Object.keys(CHAR).forEach(k=>{ state.chars[k]=R(CHAR[k].opts); });
  state.phases={};
  PHASES.forEach(p=>{ state.phases[p.n]=R(p.opts); });
  render();
  document.getElementById('result').style.display='block';
  document.getElementById('empty-msg').style.display='none';
}

function render(){
  // Char grid
  const cg = document.getElementById('char-grid');
  cg.innerHTML = Object.entries(CHAR).map(([key,def])=>{
    const c = state.chars[key];
    return `<div class="char-card" id="char-${key}">
      <div class="card-label">${def.icon} ${def.label}</div>
      <div class="card-text">${c.t}</div>
      <div class="card-footer">
        <span class="badge-wrap">${badge(c.tp)}</span>
        <span class="reroll" onclick="rerollChar('${key}')">🎲</span>
      </div>
    </div>`;
  }).join('');

  // Acts
  const acts = document.getElementById('acts');
  acts.innerHTML = ACTS.map(a=>{
    const ps = PHASES.filter(p=>p.act===a.n);
    return `<div class="act-block">
      <div class="act-header" style="border-bottom:2px solid ${a.color}">
        <span class="act-label" style="color:${a.color}">${a.label}</span>
        <span class="act-sub">【${a.sub}】</span>
      </div>
      ${ps.map(p=>{
        const c = state.phases[p.n];
        return `<div class="phase-card" id="phase-${p.n}"
          style="background:${a.bg};border:1px solid ${a.color}22;border-left:3px solid ${a.color}">
          <div class="phase-num" style="background:${a.color}22;color:${a.color}">${p.n}</div>
          <div class="phase-info">
            <div class="phase-name" style="color:${a.color}">${p.name}</div>
            <div class="phase-text">${c.t}</div>
          </div>
          <div class="phase-side">
            <span class="badge-wrap">${badge(c.tp)}</span>
            <span class="reroll" onclick="rerollPhase(${p.n})">🎲</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  // Reset copy btn
  const cb = document.getElementById('copy-btn');
  cb.className='copy-btn';
  cb.textContent='📋 シナリオ全文をコピー';
}

function copyAll(){
  const charText = Object.entries(CHAR)
    .map(([k,v])=>`【${v.label}】${state.chars[k].t}`).join('\n');
  const phaseText = PHASES
    .map(p=>`${p.n}. ${p.name}：${state.phases[p.n].t}`).join('\n');
  const text = `=== シナリオ骨格 ===\n\n▼ キャラクター設定\n${charText}\n\n▼ 13フェイズ\n${phaseText}`;
  navigator.clipboard.writeText(text).then(()=>{
    const cb = document.getElementById('copy-btn');
    cb.className='copy-btn ok';
    cb.textContent='✓ コピーしました！';
    setTimeout(()=>{cb.className='copy-btn';cb.textContent='📋 シナリオ全文をコピー';},2000);
  });
}
</script>
